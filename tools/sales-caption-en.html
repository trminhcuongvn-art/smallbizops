<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Sales Caption Generator — SmallBizOps</title>
  <meta name="description" content="Generate high-converting sales captions for Facebook, Instagram, and TikTok. Free prompt generator — no API, no signup." />
  <meta property="og:title" content="Free Sales Caption Generator — SmallBizOps" />
  <meta property="og:description" content="Generate sales captions instantly. No API key needed." />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap&subset=vietnamese" rel="stylesheet" />
  <style>
    :root{--bg:#FFFFFF;--surface:#F7F6F3;--ink:#111111;--muted:#6b6b6b;--border:#EAEAEA;--radius:12px;--radius-sm:6px;--radius-btn:6px;--ease:cubic-bezier(0.16,1,0.3,1);--font:'Be Vietnam Pro',system-ui,-apple-system,sans-serif}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;min-height:100dvh;font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    a:focus-visible,button:focus-visible{outline:2px solid #111;outline-offset:4px}
    .wrap{max-width:min(720px,100%);margin:0 auto;padding:40px 20px 64px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .brand{font-weight:700;letter-spacing:-.03em;font-size:1rem}
    .back{font-size:.85rem;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-btn);padding:7px 12px;transition:background .18s var(--ease)}
    .back:hover{background:var(--surface)}
    h1{font-size:clamp(28px,5vw,42px);line-height:1.05;letter-spacing:-.03em;margin:0 0 12px;font-weight:700}
    .subtitle{color:var(--muted);font-size:.95rem;margin:0 0 32px}
    .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);padding:10px 12px;font:inherit;font-size:.95rem;outline:none;transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
    input:focus,select:focus,textarea:focus{border-color:#111;box-shadow:0 0 0 3px rgba(17,17,17,.08)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    button{border:1px solid transparent;border-radius:var(--radius-btn);padding:10px 18px;font:inherit;font-weight:600;font-size:.9rem;cursor:pointer;transition:transform .12s var(--ease),background-color .18s var(--ease),border-color .18s var(--ease)}
    button:active{transform:translateY(1px)}
    .btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
    .btn-primary:hover{background:#2b2b2b}
    .btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--surface)}
    .btn-secondary:disabled{opacity:.4;cursor:not-allowed}
    .result{min-height:140px;margin-top:16px;white-space:pre-wrap;background:var(--surface);font-size:.9rem;border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;resize:vertical}
    .status{font-size:.85rem;color:var(--muted);margin-top:8px;min-height:1.2em}
    footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:48px;padding-top:16px;border-top:1px solid var(--border)}
    @media(max-width:600px){.row{grid-template-columns:1fr}.wrap{padding:24px 16px 48px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand">SmallBizOps</span>
    <a class="back" data-track="tool_back_home" href="../?utm_source=smallbizops&utm_medium=tool_page&utm_campaign=day2_growth&utm_content=back_home">← Home</a>
  </div>

  <h1>Sales Caption Generator</h1>
  <p class="subtitle">Generate high-converting captions for Facebook, Instagram, and TikTok. Free — no API key, no data sent to any server.</p>

  <div class="card">
    <label for="product">Product / Topic</label>
    <input id="product" type="text" placeholder="e.g. Ginger honey tea for office workers" />

    <div class="row" style="margin-top:14px">
      <div>
        <label for="platform">Platform</label>
        <select id="platform">
          <option>Facebook</option>
          <option>Instagram</option>
          <option>TikTok</option>
          <option>Facebook & Instagram</option>
        </select>
      </div>
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option>Friendly</option>
          <option>Professional</option>
          <option>Fun & casual</option>
          <option>Premium</option>
        </select>
      </div>
    </div>

    <div style="margin-top:14px">
      <label for="audience">Target audience</label>
      <input id="audience" type="text" placeholder="e.g. women 25-40, office workers" />
    </div>

    <div class="actions">
      <button class="btn-primary" data-track="generate_prompt" onclick="generate()">Generate prompt</button>
      <button class="btn-secondary" id="copyBtn" data-track="copy_prompt" onclick="copyResult()" disabled>Copy</button>
      <button class="btn-secondary" id="chatBtn" data-track="open_chatgpt" onclick="openChatGPT()" disabled>Open in ChatGPT</button>
    </div>
    <div class="status" id="status"></div>
    <textarea class="result" id="result" readonly></textarea>
  </div>

  <footer>SmallBizOps — Free prompt tools for small business operators. <a data-track="tool_more_tools" href="../?utm_source=smallbizops&utm_medium=tool_en&utm_campaign=day2_growth&utm_content=more_tools">More tools →</a></footer>
</div>

<script>
const PREFIX = "You are an expert social media copywriter. Write in English. Be concise, engaging, and conversion-focused.";

function v(id){return document.getElementById(id).value.trim()}
function $(id){return document.getElementById(id)}

function generate(){
  const product = v('product');
  if(!product){$('status').textContent='Please enter a product or topic.';return}
  const platform = v('platform');
  const tone = v('tone');
  const audience = v('audience');
  const prompt = `${PREFIX}\n\nTask: Write a sales caption for ${platform}.\nProduct/Topic: ${product}\nTarget audience: ${audience||'general consumers'}\nTone: ${tone}\nRequirements:\n- Start with a strong hook (question, bold statement, or relatable pain point)\n- 2-4 sentences of value/benefit\n- Clear CTA at the end\n- Add 3-5 relevant hashtags\n- Keep it under 150 words`;
  $('result').value = prompt;
  $('status').textContent = 'Prompt ready. Copy to ChatGPT or click "Open in ChatGPT".';
  $('copyBtn').disabled = false;
  $('chatBtn').disabled = false;
}

function copyResult(){
  const text = $('result').value;
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    $('status').textContent = 'Copied to clipboard!';
  }).catch(()=>{
    $('result').select();
    document.execCommand('copy');
    $('status').textContent = 'Copied!';
  });
}

function openChatGPT(){
  const text = $('result').value;
  if(!text) return;
  const encoded = encodeURIComponent(text);
  if(encoded.length < 6000){
    window.open('https://chatgpt.com/?q='+encoded,'_blank','noopener');
  } else {
    copyResult();
    window.open('https://chatgpt.com/','_blank','noopener');
    $('status').textContent = 'Prompt copied — paste it into ChatGPT.';
  }
}
</script>
</body>
</html>
