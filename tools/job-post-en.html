<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Job Post Generator — SmallBizOps</title>
  <meta name="description" content="Generate hiring post prompts for retail, service, and small business roles. Free, local, no API, no signup." />
  <meta property="og:title" content="Free Job Post Generator — SmallBizOps" />
  <meta property="og:description" content="Create job post prompts for small business hiring instantly." />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap&subset=vietnamese" rel="stylesheet" />
  <style>
    :root{--bg:#FFFFFF;--surface:#F7F6F3;--ink:#111111;--muted:#6b6b6b;--border:#EAEAEA;--radius:12px;--radius-sm:6px;--radius-btn:6px;--ease:cubic-bezier(0.16,1,0.3,1);--font:'Be Vietnam Pro',system-ui,-apple-system,sans-serif}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100dvh;font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}a:focus-visible,button:focus-visible{outline:2px solid #111;outline-offset:4px}
    .wrap{max-width:min(720px,100%);margin:0 auto;padding:40px 20px 64px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .brand{font-weight:700;letter-spacing:-.03em;font-size:1rem}.back{font-size:.85rem;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:7px 12px;transition:background .18s var(--ease)}.back:hover{background:var(--surface)}
    h1{font-size:clamp(28px,5vw,42px);line-height:1.05;letter-spacing:-.03em;margin:0 0 12px;font-weight:700}.subtitle{color:var(--muted);font-size:.95rem;margin:0 0 32px}
    .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--ink);padding:10px 12px;font:inherit;font-size:.95rem;outline:none;transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
    input:focus,select:focus,textarea:focus{border-color:#111;box-shadow:0 0 0 3px rgba(17,17,17,.08)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    button{border:1px solid transparent;border-radius:6px;padding:10px 18px;font:inherit;font-weight:600;font-size:.9rem;cursor:pointer;transition:transform .12s var(--ease),background-color .18s var(--ease)}
    button:active{transform:translateY(1px)}.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:#2b2b2b}
    .btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface)}.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
    .result{min-height:140px;margin-top:16px;white-space:pre-wrap;background:var(--surface);font-size:.9rem;border-radius:6px;border:1px solid var(--border);padding:12px;resize:vertical}
    .status{font-size:.85rem;color:var(--muted);margin-top:8px;min-height:1.2em}
    footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:48px;padding-top:16px;border-top:1px solid var(--border)}
    @media(max-width:600px){.row{grid-template-columns:1fr}.wrap{padding:24px 16px 48px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand">SmallBizOps</span>
    <a class="back" href="../?utm_source=smallbizops&utm_medium=tool_page&utm_campaign=day2_growth&utm_content=back_home">← Home</a>
  </div>
  <h1>Job Post Generator</h1>
  <p class="subtitle">Turn a role, schedule, and requirements into a clear hiring post. Free — no API key, no data sent to any server.</p>
  <div class="card">
    <label for="role">Role title</label>
    <input id="role" type="text" placeholder="e.g. Part-time retail assistant" />
    <div class="row">
      <div><label for="schedule">Schedule</label><input id="schedule" type="text" placeholder="e.g. 4 evenings/week" /></div>
      <div><label for="location">Location</label><input id="location" type="text" placeholder="e.g. Austin, TX" /></div>
    </div>
    <div style="margin-top:14px"><label for="requirements">Requirements / benefits</label><input id="requirements" type="text" placeholder="e.g. friendly, basic POS, paid training" /></div>
    <div style="margin-top:14px">
      <label for="formula">Formula / style</label>
      <select id="formula" data-track="formula_selector"><option>AIDA</option><option>FAQ</option><option>Storytelling</option><option>Clear Requirements</option></select>
      <p class="status" style="margin:6px 0 0">Need help choosing? <a data-track="content_formulas_link" href="../content-formulas.html?utm_source=smallbizops&utm_medium=tool_en&utm_campaign=formula_selector&utm_content=job-post-en">View content formulas →</a></p>
    </div>


    <div class="row" style="margin-top:14px">
      <div><label for="industry">Industry</label><select id="industry" data-track="industry_selector"><option>F&B</option><option>Beauty</option><option>B2B</option><option>Fashion</option><option>Health</option><option>Education</option><option>Real Estate</option><option>Tech</option><option>Retail</option></select></div>
      <div><label for="platformGuide">Platform guidance</label><select id="platformGuide" data-track="platform_selector"><option>Shopee</option><option>TikTok</option><option>TikTok Shop</option><option>Facebook</option><option>Instagram</option><option>Lazada</option><option>Zalo</option><option>LinkedIn</option><option>YouTube</option><option>Website</option></select></div>
    </div>

    <div class="actions">
      <button class="btn-primary" data-track="generate_prompt" onclick="generate()">Generate prompt</button>
      <button class="btn-secondary" id="copyBtn" data-track="copy_prompt" onclick="copyResult()" disabled>Copy</button>
      <button class="btn-secondary" id="chatBtn" data-track="open_chatgpt" onclick="openChatGPT()" disabled>Open in ChatGPT</button>
    </div>
    <div class="status" id="status"></div>
    <textarea class="result" id="result" readonly></textarea>
  </div>
  <footer>SmallBizOps — Free prompt tools for small business operators. <a href="../?utm_source=smallbizops&utm_medium=tool_en&utm_campaign=day2_growth">More tools →</a></footer>
</div>
<script>

const INDUSTRY_CONTEXT={
  'F&B':'Industry context: food and beverage. Mention taste, freshness, ingredients, occasions, ordering or booking details when relevant.',
  'Beauty':'Industry context: beauty. Mention skin/hair concern, routine fit, ingredients only if provided, usage notes, and avoid medical claims.',
  'B2B':'Industry context: B2B. Mention business pain point, operational benefit, proof requested, decision process, and next step.',
  'Fashion':'Industry context: fashion. Mention style, fit, material, occasions, sizing notes, and styling ideas.',
  'Health':'Industry context: health/wellness. Keep claims careful, suggest consulting professionals when needed, focus on support and usage context.',
  'Education':'Industry context: education. Mention learner level, outcome, curriculum/format, schedule, and enrollment next step.',
  'Real Estate':'Industry context: real estate. Mention location, property type, key amenities, viewing/consultation CTA, and avoid investment guarantees.',
  'Tech':'Industry context: technology. Mention use case, key features, setup, compatibility, security/privacy where relevant.',
  'Retail':'Industry context: retail. Mention product range, value, availability, store/online purchase path, and customer service.'
};
const PLATFORM_CONTEXT={
  'Shopee':'Platform format: marketplace listing. Use searchable title words, concise bullets, specs, shipping/return notes if provided, and clear buy CTA.',
  'TikTok':'Platform format: short-video caption/script. Use a quick hook, simple scene idea, short lines, CTA, and 3-5 relevant hashtags.',
  'TikTok Shop':'Platform format: social-commerce listing/live caption. Combine product benefit, key specs, offer details if provided, and shop CTA.',
  'Facebook':'Platform format: feed post. Use hook, 2-4 short paragraphs, soft CTA, and optional local/community angle.',
  'Instagram':'Platform format: visual caption. Use first-line hook, concise value, line breaks, CTA, and 3-5 relevant hashtags.',
  'Lazada':'Platform format: marketplace listing. Use benefit-led title, bullets, specs, warranty/return notes if provided, and clear CTA.',
  'Zalo':'Platform format: direct/local message. Keep concise, polite, practical, with clear contact/order next step.',
  'LinkedIn':'Platform format: professional post. Use clear business insight, credibility, practical takeaway, and conversation CTA.',
  'YouTube':'Platform format: video title/description. Include searchable title angle, short description, key points, CTA, and chapters if relevant.',
  'Website':'Platform format: website copy. Use headline, subheadline, benefits, proof placeholders, FAQ/CTA, and skimmable sections.'
};
function ctx(id,map){const el=document.getElementById(id);return el&&map[el.value]?map[el.value]:''}

const PREFIX='You are an experienced small business recruiter. Write in English. Be clear, inclusive, and practical.';
function v(id){return document.getElementById(id).value.trim()}
function $(id){return document.getElementById(id)}
function generate(){
  const role=v('role'); if(!role){$('status').textContent='Please enter a role title.';return}
  const prompt=`${PREFIX}

Task: Write a job post for a small business.
Role: ${role}
Schedule: ${v('schedule')||'not specified'}
Location: ${v('location')||'not specified'}
Requirements/benefits: ${v('requirements')||'not specified'}
Formula / style: ${v('formula')}
${ctx('industry',INDUSTRY_CONTEXT)}
${ctx('platformGuide',PLATFORM_CONTEXT)}
Requirements:
- Start with a short hiring headline
- Include responsibilities, requirements, schedule, pay/benefits if available
- Use inclusive language
- End with how to apply
- Keep it easy to scan with bullets`;
  $('result').value=prompt;$('status').textContent='Prompt ready. Copy to ChatGPT or click "Open in ChatGPT".';$('copyBtn').disabled=false;$('chatBtn').disabled=false;
}

function copyResult(){const t=$('result').value;if(!t)return;navigator.clipboard.writeText(t).then(()=>{$('status').textContent='Copied!'}).catch(()=>{$('result').select();document.execCommand('copy');$('status').textContent='Copied!'})}
function openChatGPT(){const t=$('result').value;if(!t)return;const e=encodeURIComponent(t);if(e.length<6000){window.open('https://chatgpt.com/?q='+e,'_blank','noopener')}else{copyResult();window.open('https://chatgpt.com/','_blank','noopener');$('status').textContent='Prompt copied — paste it into ChatGPT.'}}
</script>
</body>
</html>
